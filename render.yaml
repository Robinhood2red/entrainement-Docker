# ============================================================================
# @file: render.yaml
# @description: Configuration Infrastructure as Code (Blueprint) pour Render.
#               Définit le Web Service pour le backend Node.js sous Docker.
# ============================================================================

services:
  - type: web
    name: fittrack-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.prod
    rootDir: backend
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false