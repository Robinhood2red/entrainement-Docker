events {
  worker_connections 1024;
  # Connexions max simultanées — 1024 largement suffisant en dev
}

http {
  # Définition des serveurs en amont (upstreams)
  upstream backend {
    server backend:5000;
    # "backend" = nom du service dans docker-compose.yml
    # Docker résout ce nom via son DNS interne
  }

  upstream frontend {
    server frontend:3000;
  }

  server {
    listen 80;
    server_name localhost;

    # Règle 1 : /api/* → backend Node.js
    location /api/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # Règle 2 : tout le reste → frontend React
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      # Ces headers sont ESSENTIELS pour le Hot Module Replacement (HMR) de Vite
      # HMR utilise WebSocket pour mettre à jour le navigateur en temps réel
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
